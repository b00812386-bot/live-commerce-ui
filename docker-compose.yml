version: "3.9"

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_predictor
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/video_predictor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
      DEFAULT_USERNAME: demo
      DEFAULT_PASSWORD: demo123
    depends_on:
      - postgres
      - redis
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data

  worker:
    build: ./backend
    command: celery -A worker.celery_app worker --loglevel=info
    environment:
      DATABASE_URL: postgresql+psycopg2://postgres:postgres@postgres:5432/video_predictor
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: dev-secret-key
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend/data:/app/data

  frontend:
    image: node:20
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    environment:
      VITE_API_BASE: http://localhost:8000
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
    depends_on:
      - backend

volumes:
  pgdata:
